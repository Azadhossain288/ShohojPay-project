    <section id="add-money" class="w-11/12 mx-auto py-5 hidden">

           <h2 class="text-xl font-bold">Add Money</h2>
           <div class="card bg-base-100 w-full  shadow rounded-2xl">

        <div class="card-body ">
        <fieldset class="fieldset">
         
         <label class="label font-medium text-[#080808]">Select Bank</label>
          <select id="add-money-bank" class="select w-full bg-base-200 rounded-full">
         <option disabled selected>Select a Bank</option>
         <option value="Islami Bank">Islami Bank</option>
         <option value="City Bank">City Bank</option>
         <option value="IBBL">IBBL</option>
    </select>

    <br>

          <label class="label font-medium text-[#080808]">Bank Account Number</label>
          <input id="add-money-number"maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full" placeholder="Enter Bank 11 digit number" />
          <label class="label font-medium text-[#080808]">Amount to Add</label>
          <input id="add-money-amount" type="number" class="input bg-base-200 rounded-full w-full" placeholder="Enter amount to Add" />
          <label class="label font-medium text-[#080808]">Pin Number</label>
          <input id="add-money-pin" maxlength="4" minlength="4" type="password" class="input bg-base-200 rounded-full w-full" placeholder="Enter 4 digit pin number" />
          
          <button id="add-money-btn" class="btn btn-primary mt-4 rounded-full">Add Money</button>
        </fieldset>
      </div>


         </div>

    </section>




    <section id="cashout" class="w-11/12 mx-auto py-5 hidden">

         <h2 class="text-xl font-bold">Cashout</h2>


     <div class="card bg-base-100 w-full  shadow rounded-2xl">

        <div class="card-body ">
        <fieldset class="fieldset">
          <label class="label font-medium text-[#080808]">Agent Number</label>
          <input id="cashout-number"maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full" placeholder="Enter 11 digit number" />
          <label class="label font-medium text-[#080808]">Amount</label>
          <input id="cashout-amount" type="number" class="input bg-base-200 rounded-full w-full" placeholder="Enter amount to withdraw" />
          <label class="label font-medium text-[#080808]">Pin Number</label>
          <input id="cashout-pin" maxlength="4" minlength="4" type="password" class="input bg-base-200 rounded-full w-full" placeholder="Enter 4 digit pin number" />
          
          <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">Withdraw Money</button>
        </fieldset>
      </div>


         </div>
         



    </section>



    <section id="transfer-money" class="w-11/12 mx-auto py-5 hidden">

         <h2 class="text-xl font-bold">Transfer Money</h2>

         <div class="card bg-base-100 w-full  shadow rounded-2xl">

        <div class="card-body ">
        <fieldset class="fieldset">
          <label class="label font-medium text-[#080808]">User Account Number</label>
          <input id="sendMoney-number"maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full" placeholder="Enter 11 digit number" />
          <label class="label font-medium text-[#080808]">Amount</label>
          <input id="sendMoney-amount" type="number" class="input bg-base-200 rounded-full w-full" placeholder="Enter amount to transfer" />
          <label class="label font-medium text-[#080808]">Pin Number</label>
          <input id="sendMoney-pin" maxlength="4" minlength="4" type="password" class="input bg-base-200 rounded-full w-full" placeholder="Enter 4 digit pin number" />
          
          <button id="sendMoney-btn" class="btn btn-primary mt-4 rounded-full">Send Now</button>
        </fieldset>
      </div>


         </div>


          

    </section>


    <section id="Pay-bill"class="w-11/12 mx-auto py-5 hidden">

             <h2 class="text-xl font-bold">Pay Bill</h2>

         <div class="card bg-base-100 w-full  shadow rounded-2xl">

        <div class="card-body ">
        <fieldset class="fieldset">

          <label class="label font-medium text-[#080808]">Select Payment Method</label>
     <select id="select-payment" class="select w-full bg-base-200 rounded-full">
      <option disabled selected>Select a payment method</option>
      <option value="bkash">bKash</option>
      <option value="nagad">Nagad</option>
      <option value="rocket">Rocket</option>
      <option value="bank">Bank Transfer</option>
      <option value="card">Debit / Credit Card</option>
  </select>

   <br>

          <label class="label font-medium text-[#080808]">Biller Account Number</label>
          <input id="PayMoney-number"maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full" placeholder="Enter account number " />
          <label class="label font-medium text-[#080808]">Amount to Pay</label>
          <input id="PayMoney-amount" type="number" class="input bg-base-200 rounded-full w-full" placeholder="Add Amount to pay" />
          <label class="label font-medium text-[#080808]">Pin Number</label>
          <input id="PayMoney-pin" maxlength="4" minlength="4" type="password" class="input bg-base-200 rounded-full w-full" placeholder="Enter 4 digit pin number" />
          
          <button id="payMoney-btn" class="btn btn-primary mt-4 rounded-full">Pay Now</button>
        </fieldset>
      </div>


         </div>




    </section>





    <section id="history" class="w-11/12 mx-auto py-5 hidden">

       <h2 class="text-xl font-bold mb-5">Transactions</h2>
       <div class="space-y-5" id="history-container">
                 

       </div>


    </section>
